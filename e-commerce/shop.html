function renderBooks(category, containerId) {
    const bookContainer = document.getElementById(containerId);
    bookContainer.innerHTML = "";

    books[category].forEach(book => {
        const bookElement = document.createElement("div");
        bookElement.classList.add("book");

        bookElement.innerHTML = `
            <img src="${book.image}" alt="${book.title}">
            <h3>${book.title}</h3>
            <p>Author: ${book.author}</p>
            <p>Price: ₹${book.price.toFixed(2)}</p>
            <button onclick="addToCart('${book.title}')">Add to Cart</button>
        `;

        bookContainer.appendChild(bookElement);
    });
}
function addToCart(title) {
            const existingCart = JSON.parse(localStorage.getItem("cart")) || [];
            const existingBook = existingCart.find(book => book.title === title);

            if (existingBook) {
                showPopup("This book is already in the cart!");
            } else {
                const bookToAdd = Object.values(books).flat().find(book => book.title === title);

                if (bookToAdd) {
                    existingCart.push(bookToAdd);
                    localStorage.setItem("cart", JSON.stringify(existingCart));
                    showPopup(`${bookToAdd.title} has been added to the cart!`);
                } else {
                    showPopup("Book not found!");
                }
            }
        }

        function showPopup(message) {
            const popup = document.getElementById("popup");
            const overlay = document.getElementById("overlay");
            const popupText = document.getElementById("popupText");

            
            popupText.textContent = message;

            
            overlay.style.display = "block";
            popup.style.display = "block";
            setTimeout(() => {
                closePopup();
            }, 1000);
        }

        function closePopup() {
            const popup = document.getElementById("popup");
            const overlay = document.getElementById("overlay");

           
            overlay.style.display = "none";
            popup.style.display = "none";
        }

window.onload = function () {
    renderBooks("fiction", "bookContainerFiction");
    renderBooks("nonFiction", "bookContainerNonFiction");
    renderBooks("mystery", "bookContainerMystery");
